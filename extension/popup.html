<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartPhish Detector</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto; margin:0; padding:0; width:420px; background:#f7f9fc; color:#222;}
    .header { padding:12px 16px; display:flex; align-items:center; background:linear-gradient(135deg,#10b981,#1e3a8a); color:white; }
    .header h1 { margin:0 0 0 10px; font-size:1.2rem; }
    .content { padding:14px; }
    .score-display { display:flex; justify-content:space-between; background:#fff; padding:12px; border-radius:8px; box-shadow:0 4px 10px rgba(2,6,23,0.06); margin-bottom:12px; }
    .score-value { font-size:2.4rem; font-weight:800; }
    .status-label { padding:4px 8px; border-radius:6px; font-weight:600; }
    .status-low { background:#d1fae5; color:#065f46; } .status-medium { background:#fef3c7; color:#92400e; } .status-high { background:#fee2e2; color:#991b1b; }
    .param-list { margin-top:8px; }
    .parameter-item { display:flex; align-items:center; justify-content:space-between; margin:8px 0; }
    .param-bar-container { flex:1; height:8px; background:#eaeef6; border-radius:6px; margin:0 8px; overflow:hidden; }
    .param-bar { height:100%; border-radius:6px; transition:width 0.5s ease; }
    .small { font-size:0.85rem; color:#475569; }
    .manual { display:flex; gap:8px; margin-top:12px; }
    input[type="text"]{flex:1;padding:8px;border-radius:6px;border:1px solid #d1d5db;}
    button{padding:8px 10px;border-radius:6px;border:none;background:#1e3a8a;color:white;font-weight:600;cursor:pointer;}
    .footer { font-size:0.78rem;color:#475569;margin-top:12px; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
    <h1>SmartPhish</h1>
  </div>

  <div class="content">
    <div class="score-display">
      <div>
        <div class="small">Overall Phishing Risk</div>
        <div style="display:flex;align-items:center;">
          <div id="main-score" class="score-value">--</div>
          <div id="status-label" class="status-label status-medium" style="margin-left:8px">Loading</div>
        </div>
      </div>
      <div style="width:100px; text-align:center;">
        <div id="score-percent" style="font-weight:700">--%</div>
        <div style="font-size:0.75rem;color:#6b7280">Confidence</div>
      </div>
    </div>

    <div class="param-list" id="parameter-breakdown"></div>

    <div style="margin-top:10px">
      <div class="small">Model Uncertainty: <span id="uncertainty-value">--%</span></div>
    </div>

    <p class="small" id="current-url">Checking active tab...</p>

    <div class="manual">
      <input id="manual-url" placeholder="Add or check URL (paste here)" />
      <button id="check-btn">Check</button>
    </div>

    <div style="margin-top:8px; display:flex; gap:8px;">
      <button id="add-whitelist" style="flex:1;background:#10b981">Add to Whitelist</button>
      <button id="add-blacklist" style="flex:1;background:#ef4444">Add to Blacklist</button>
    </div>

    <div class="footer">Open Options page to view lists. Backend: <code>http://127.0.0.1:5000</code></div>
  </div>

  <!-- Load external script (NO inline script) -->
  <script src="popup.js"></script>
</body>
</html>
