<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>SmartPhish Options</title>
  <style>
    body{font-family:system-ui;margin:18px;color:#0f172a}
    h2{margin-bottom:6px}
    .list{border:1px solid #e6eef8;padding:10px;border-radius:8px;margin-bottom:12px}
    .entry{display:flex;justify-content:space-between;padding:6px 0}
    button{background:#ef4444;color:white;border:none;padding:6px 8px;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>
  <h2>Whitelist</h2>
  <div id="wl" class="list">Loading...</div>

  <h2>Blacklist</h2>
  <div id="bl" class="list">Loading...</div>

<script>
function loadLists(){
  chrome.storage.local.get(['whitelist','blacklist'], (data) => {
    const wl = data.whitelist || [];
    const bl = data.blacklist || [];
    const wlEl = document.getElementById('wl'); wlEl.innerHTML='';
    const blEl = document.getElementById('bl'); blEl.innerHTML='';

    if (!wl.length) wlEl.innerHTML = '<em>No entries</em>';
    else wl.forEach((u,i)=> {
      const div = document.createElement('div'); div.className='entry';
      div.innerHTML = `<div style="max-width:80%">${u}</div><button data-i="${i}" data-list="whitelist">Remove</button>`;
      wlEl.appendChild(div);
    });

    if (!bl.length) blEl.innerHTML = '<em>No entries</em>';
    else bl.forEach((u,i)=> {
      const div = document.createElement('div'); div.className='entry';
      div.innerHTML = `<div style="max-width:80%">${u}</div><button data-i="${i}" data-list="blacklist">Remove</button>`;
      blEl.appendChild(div);
    });
  });
}

document.addEventListener('click', (e) => {
  if (e.target.tagName==='BUTTON' && e.target.dataset.list) {
    const list = e.target.dataset.list;
    const idx = Number(e.target.dataset.i);
    chrome.storage.local.get([list], (data) => {
      const arr = data[list] || [];
      arr.splice(idx,1);
      chrome.storage.local.set({[list]: arr}, loadLists);
    });
  }
});

document.addEventListener('DOMContentLoaded', loadLists);
</script>
</body>
</html>
